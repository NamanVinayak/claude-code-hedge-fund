name: Dashboard Builder

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install dependencies
        run: pip install -e ".[extras]"

      - name: Check Market Hours
        id: market_check
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "Manual trigger. Proceeding without market hours check."
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          export TZ='America/New_York'
          DOW=$(date +%u)
          TIME=$(date +%H%M)

          echo "Current ET Day: $DOW, Time: $TIME"

          if [ "$DOW" -gt 5 ]; then
            echo "Outside market hours, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "1$TIME" -lt 10930 ] || [ "1$TIME" -gt 11600 ]; then
            echo "Outside market hours, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Ingest New Decisions
        if: steps.market_check.outputs.skip != 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python tracker/ingest_decisions.py

      - name: Run Simulator
        if: steps.market_check.outputs.skip != 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: python tracker/simulator.py

      - name: Run Dashboard Builder
        if: steps.market_check.outputs.skip != 'true'
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          mkdir -p dashboard/dist
          if [ -f "dashboard/build.py" ]; then
            python dashboard/build.py --output dashboard/dist
          else
            echo "<html><body><h1>Dashboard coming soon</h1></body></html>" > dashboard/dist/index.html
          fi

      - name: Check dist directory
        id: dist_check
        if: steps.market_check.outputs.skip != 'true'
        run: |
          if [ -d "dashboard/dist" ] && [ "$(ls -A dashboard/dist)" ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi
          echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        if: steps.market_check.outputs.skip != 'true' && steps.dist_check.outputs.has_files == 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dashboard/dist
          publish_branch: gh-pages
          commit_message: "dashboard: auto-update ${{ steps.dist_check.outputs.ts }}"
