<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | AI Hedge Fund</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0d1117;
            --surface:  #161b22;
            --surface2: #1c2128;
            --border:   #21262d;
            --border2:  #30363d;
            --text:     #e6edf3;
            --muted:    #7d8590;
            --subtle:   #484f58;
            --green:    #3fb950;
            --green-dim:#1a3a20;
            --red:      #f85149;
            --red-dim:  #3b1a1a;
            --blue:     #58a6ff;
            --blue-dim: #1a2a3a;
            --yellow:   #d29922;
            --yellow-dim:#2d2004;
            --font:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --mono:     'JetBrains Mono', 'Fira Code', monospace;
            --radius:   10px;
            --radius-sm:6px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            font-size: 14px;
        }

        /* ── NAV ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(13,17,23,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            height: 56px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-brand {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-right: 16px;
            white-space: nowrap;
        }
        .nav-brand .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .nav-links { display: flex; gap: 4px; flex: 1; }
        .nav-link {
            color: var(--muted);
            text-decoration: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            transition: color .15s, background .15s;
            white-space: nowrap;
        }
        .nav-link:hover { color: var(--text); background: var(--surface2); }
        .nav-link.active { color: var(--text); background: var(--surface2); }
        .nav-meta {
            font-size: 11px;
            color: var(--muted);
            font-family: var(--mono);
            white-space: nowrap;
            margin-left: auto;
        }

        /* ── LAYOUT ── */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px 20px;
            flex: 1;
        }

        /* ── PAGE HEADER ── */
        .page-header { margin-bottom: 28px; }
        .page-header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }
        .page-header p {
            color: var(--muted);
            font-size: 13px;
            margin-top: 4px;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
        }
        .card-sm {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        /* ── BADGES ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .badge-buy, .badge-long  { background: var(--green-dim); color: var(--green); }
        .badge-short { background: var(--red-dim);   color: var(--red);   }
        .badge-hold  { background: var(--surface2);  color: var(--muted); }
        .badge-win, .badge-target_hit { background: var(--green-dim); color: var(--green); }
        .badge-stop_hit  { background: var(--red-dim);   color: var(--red);   }
        .badge-expired   { background: var(--yellow-dim); color: var(--yellow); }

        /* ── PROFIT / LOSS COLORS ── */
        .profit { color: var(--green); }
        .loss   { color: var(--red);   }
        .neutral { color: var(--muted); }

        /* ── STAT BLOCKS ── */
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-block {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }
        .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
        .stat-value { font-size: 22px; font-weight: 700; font-family: var(--mono); line-height: 1; }
        .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

        /* ── GRID ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

        /* ── DIVIDER ── */
        hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

        /* ── TABLES ── */
        .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th {
            background: var(--surface2);
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--muted);
            text-align: left;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            vertical-align: middle;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface2); }
        td a { color: inherit; text-decoration: none; font-weight: 600; }
        td a:hover { color: var(--blue); }
        .mono { font-family: var(--mono); }

        /* ── PROGRESS BAR ── */
        .progress-wrap { background: var(--border); border-radius: 3px; height: 4px; }
        .progress-fill { height: 4px; border-radius: 3px; }

        /* ── EMPTY STATE ── */
        .empty {
            text-align: center;
            padding: 64px 20px;
            color: var(--muted);
        }
        .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.5; }
        .empty h2 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
        .empty p { font-size: 13px; max-width: 360px; margin: 0 auto; }

        /* ── CONFIDENCE BAR ── */
        .conf-wrap { display: flex; align-items: center; gap: 8px; }
        .conf-bar-bg { flex: 1; background: var(--border); border-radius: 3px; height: 4px; }
        .conf-bar { height: 4px; border-radius: 3px; background: var(--blue); }
        .conf-label { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 32px; text-align: right; }

        /* ── FOOTER ── */
        footer {
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        /* ── TAG ── */
        .tag {
            display: inline-block;
            padding: 2px 8px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            border-radius: 4px;
            font-size: 11px;
            color: var(--muted);
        }

        /* ── MOBILE ── */
        @media (max-width: 640px) {
            .container { padding: 16px 12px; }
            .nav-inner { padding: 0 12px; }
            .nav-brand span { display: none; }
            .nav-meta { display: none; }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .stat-grid { grid-template-columns: 1fr 1fr; }
            .hide-mobile { display: none !important; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
<nav>
    <div class="nav-inner">
        <a class="nav-brand" href="index.html">
            <div class="dot"></div>
            <span>AI Hedge Fund</span>
        </a>
        <div class="nav-links">
            <a class="nav-link {% if title == 'Live Positions' %}active{% endif %}" href="index.html">Positions</a>
            <a class="nav-link {% if title == "Today's Decisions" %}active{% endif %}" href="today.html">Decisions</a>
            <a class="nav-link {% if title == 'All Runs' %}active{% endif %}" href="runs.html">All Runs</a>
            <a class="nav-link {% if title == 'Closed Trades' %}active{% endif %}" href="closed.html">History</a>
        </div>
        <div class="nav-meta">{{ last_updated }} PT · next update <span id="countdown" style="font-family:var(--mono);color:var(--text);font-weight:600;">--:--</span></div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<footer>
    Live AI swing trading · Updates every 5 min via GitHub Actions · <a href="https://github.com/NamanVinayak/claude-code-hedge-fund" style="color:var(--blue);text-decoration:none">Open source</a>
</footer>

{% block scripts %}{% endblock %}
<script>
(function() {
    function tick() {
        var now = new Date();
        var sec = now.getMinutes() * 60 + now.getSeconds();
        var nextSec = Math.ceil((sec + 1) / 300) * 300;
        var remaining = nextSec - sec;
        var m = Math.floor(remaining / 60);
        var s = remaining % 60;
        var el = document.getElementById('countdown');
        if (el) el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }
    tick();
    setInterval(tick, 1000);
})();
</script>
</body>
</html>
